<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeyondReel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #ccc;
      margin-bottom: 30px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .links {
      margin-top: 30px;
    }

    .links a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
      font-size: 18px;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BeyondReel</h1>
    <p>AI Video Portfolio by Shai Rodogovsky</p>

    <div class="video-wrap">
      <iframe
        src="https://player.cloudinary.com/embed/?cloud_name=dwibe3rjs&public_id=Reel_Cut_01_rgqob6"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="links">
      <a href="mailto:beyondreelai@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/shai-rodogovsky-5844001a/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    </div>
  </div>
</body>
</html>
